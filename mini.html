<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #ff5500;
      --bg: rgba(18, 18, 18, 0.95);
      --surface: rgba(30, 30, 30, 0.98);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      width: 340px;
      height: 90px;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    #mini {
      width: 340px;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,85,0,0.15);
      cursor: grab;
      position: relative;
      overflow: hidden;
    }

    #mini::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,85,0,0.05) 0%, transparent 60%);
      pointer-events: none;
      border-radius: 16px;
    }

    /* Album art */
    #art {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      background: linear-gradient(135deg, #ff5500, #c43f00);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #art svg {
      width: 24px; height: 24px;
      opacity: 0.9;
    }

    /* Track info */
    #info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #track-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #artist-name {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Progress bar */
    #progress-wrap {
      margin-top: 6px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 35%;
      background: var(--orange);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ctrl {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: all 0.15s;
      font-size: 13px;
    }

    .ctrl:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    .ctrl.play {
      width: 34px; height: 34px;
      background: var(--orange);
      color: white;
      font-size: 14px;
    }
    .ctrl.play:hover { background: #ff6a1a; }

    /* Expand / close */
    #top-actions {
      position: absolute;
      top: 8px;
      right: 10px;
      display: flex;
      gap: 4px;
    }

    .ta {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      font-size: 10px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s;
    }
    .ta:hover { color: rgba(255,255,255,0.7); }

    /* Pulse animation on art when playing */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,85,0,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255,85,0,0); }
    }

    #art.playing { animation: pulse 2s ease-in-out infinite; }

    /* Wave bars in art */
    .wave { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
    .wave span {
      width: 3px;
      background: rgba(255,255,255,0.9);
      border-radius: 2px;
      animation: wave-bar 0.8s ease-in-out infinite;
    }
    .wave span:nth-child(2) { animation-delay: 0.15s; }
    .wave span:nth-child(3) { animation-delay: 0.3s; }
    .wave span:nth-child(4) { animation-delay: 0.1s; }

    @keyframes wave-bar {
      0%, 100% { height: 4px; }
      50% { height: 18px; }
    }
  </style>
</head>
<body>
<div id="mini">
  <div id="top-actions">
    <button class="ta" id="btn-expand" title="Expand">⤢</button>
  </div>

  <div id="art" class="playing">
    <div class="wave">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div id="info">
    <div id="track-name">SoundCloud</div>
    <div id="artist-name">Open the full player to play music</div>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl" id="btn-prev" title="Previous">&#9664;&#9664;</button>
    <button class="ctrl play" id="btn-play" title="Play/Pause">&#9654;</button>
    <button class="ctrl" id="btn-next" title="Next">&#9654;&#9654;</button>
  </div>
</div>

<script>
  const { ipcRenderer } = require('electron');

  // Expand back to full player
  document.getElementById('btn-expand').onclick = () => ipcRenderer.send('expand-player');

const playBtn = document.getElementById('btn-play');
let isPlaying = false;

playBtn.onclick = () => {
  ipcRenderer.send('mini-play-pause');
  isPlaying = !isPlaying;
  playBtn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
};

document.getElementById('btn-next').onclick = () => ipcRenderer.send('mini-next');
document.getElementById('btn-prev').onclick = () => ipcRenderer.send('mini-prev');

  // Drag to move
  let dragging = false, startX, startY;

  document.getElementById('mini').addEventListener('mousedown', e => {
    if (e.target.closest('button')) return;
    dragging = true;
    startX = e.screenX;
    startY = e.screenY;
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.screenX - startX;
    const dy = e.screenY - startY;
    startX = e.screenX;
    startY = e.screenY;
    ipcRenderer.send('move-mini', { dx, dy });
  });

  document.addEventListener('mouseup', () => { dragging = false; });

  // Animate progress bar (cosmetic — real state is in the webview)
  let progress = 35;
  setInterval(() => {
    progress = (progress + 0.5) % 100;
    document.getElementById('progress-bar').style.width = progress + '%';
  }, 1000);
</script>
</body>
</html>
