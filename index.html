<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SoundCloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --orange: #ff5500;
      --orange-dim: #c43f00;
      --text: #f0f0f0;
      --muted: #888;
      --titlebar-h: 42px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Title bar ─────────────────────────────────── */
    #titlebar {
      height: var(--titlebar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      -webkit-app-region: drag;
      position: relative;
      z-index: 10;
    }

    #titlebar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
      cursor: default;
    }

    #titlebar .logo svg {
      width: 22px;
      height: 22px;
    }

    #titlebar .logo span {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    /* Nav buttons */
    #nav-btns {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
      margin-left: 4px;
    }

    #nav-btns button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }

    #nav-btns button:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    /* URL bar */
    #url-bar {
      flex: 1;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0 12px;
      height: 28px;
      gap: 6px;
      max-width: 380px;
      margin: 0 auto;
    }

    #url-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--muted);
      font-size: 11px;
      font-family: inherit;
    }

    #url-bar .go-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #url-bar .go-btn:hover { color: var(--orange); }

    /* Right controls */
    #right-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      -webkit-app-region: no-drag;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: var(--border); color: var(--text); }

    /* Mini player btn */
    #mini-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      height: 26px;
      padding: 0 10px;
      border-radius: 13px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 500;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s;
    }
    #mini-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    /* Window controls */
    #win-controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .wc {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .wc:hover { filter: brightness(1.3); }
    .wc.close   { background: #ff5f57; }
    .wc.min     { background: #febc2e; }
    .wc.max     { background: #28c840; }

    /* ── Webview ───────────────────────────────────── */
    webview {
      width: 100%;
      height: calc(100vh - var(--titlebar-h));
      display: block;
    }

    /* ── Loading overlay ───────────────────────────── */
    #loader {
      position: fixed;
      inset: var(--titlebar-h) 0 0 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 50;
      transition: opacity 0.4s;
    }

    #loader.hidden { opacity: 0; pointer-events: none; }

    .sc-logo-big svg {
      width: 60px; height: 60px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader p {
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>

<div id="titlebar">
  <!-- Window dots (macOS style) -->
  <div id="win-controls">
    <button class="wc close"  id="btn-close" title="Quit"></button>
    <button class="wc min"    id="btn-min"   title="Minimize"></button>
    <button class="wc max"    id="btn-max"   title="Maximize"></button>
  </div>

  <div class="logo">
    <!-- SoundCloud logo SVG -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1.175 12.225c-.017 0-.032.001-.047.003C.504 12.325 0 12.87 0 13.525c0 .698.566 1.264 1.264 1.264h14.76c.698 0 1.264-.566 1.264-1.264V8.788a4.73 4.73 0 00-4.73-4.73c-1.78 0-3.33.984-4.15 2.44a3.174 3.174 0 00-1.59-.428c-1.756 0-3.18 1.424-3.18 3.18 0 .087.004.173.011.258-.276.102-.488.37-.488.697l-.006-.98z" fill="#ff5500"/>
      <path d="M1.175 12.225c-.017 0-.032.001-.047.003C.504 12.325 0 12.87 0 13.525c0 .698.566 1.264 1.264 1.264h14.76c.698 0 1.264-.566 1.264-1.264V8.788a4.73 4.73 0 00-4.73-4.73c-1.78 0-3.33.984-4.15 2.44a3.174 3.174 0 00-1.59-.428c-1.756 0-3.18 1.424-3.18 3.18 0 .087.004.173.011.258-.276.102-.488.37-.488.697l-.006-.98z" fill="url(#sc-grad)"/>
      <defs>
        <linearGradient id="sc-grad" x1="0" y1="4" x2="17" y2="15" gradientUnits="userSpaceOnUse">
          <stop stop-color="#ff7700"/>
          <stop offset="1" stop-color="#ff3300"/>
        </linearGradient>
      </defs>
    </svg>
    <span>SoundCloud</span>
  </div>

  <div id="nav-btns">
    <button id="btn-back" title="Back">&#8592;</button>
    <button id="btn-fwd"  title="Forward">&#8594;</button>
    <button id="btn-reload" title="Reload">&#8635;</button>
  </div>

  <div id="url-bar">
    <span style="color:#555;font-size:10px;">🔒</span>
    <input id="url-input" type="text" value="soundcloud.com" spellcheck="false" />
    <button class="go-btn" id="btn-go">→</button>
  </div>

  <div id="right-controls">
    <button id="mini-btn">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor">
        <rect x="0" y="5" width="12" height="2" rx="1"/>
        <rect x="3" y="0" width="6" height="10" rx="1" opacity="0.3"/>
      </svg>
      Mini
    </button>
  </div>
</div>

<!-- Loading overlay -->
<div id="loader">
  <div class="sc-logo-big">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 34.5c0-3.3 2.6-6 5.9-6 .4 0 .8 0 1.2.1.6-7.6 6.9-13.6 14.6-13.6 2.4 0 4.7.6 6.6 1.7C34.4 13.1 38.7 10 43.8 10c8.3 0 15 6.7 15 15v1.2c2.5 1.1 4.2 3.6 4.2 6.4 0 3.9-3.1 7-7 7H8c-2.2 0-4-1.8-4-4z" fill="#ff5500"/>
    </svg>
  </div>
  <div class="spinner"></div>
  <p>Loading SoundCloud…</p>
</div>

<webview
  id="sc-webview"
  src="https://soundcloud.com"
  useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  partition="persist:soundcloud"
  allowpopups
></webview>

<script>
  const { ipcRenderer } = require('electron');
  const webview = document.getElementById('sc-webview');
  const urlInput = document.getElementById('url-input');
  const loader = document.getElementById('loader');

  // Window controls
  document.getElementById('btn-close').onclick  = () => ipcRenderer.send('close-window');
  document.getElementById('btn-min').onclick    = () => ipcRenderer.send('minimize-window');
  document.getElementById('btn-max').onclick    = () => ipcRenderer.send('maximize-window');

  // Nav controls
  document.getElementById('btn-back').onclick   = () => webview.goBack();
  document.getElementById('btn-fwd').onclick    = () => webview.goForward();
  document.getElementById('btn-reload').onclick = () => webview.reload();

  // Mini player toggle
  document.getElementById('mini-btn').onclick = () => ipcRenderer.send('toggle-mini');

  // URL bar
  function navigate() {
    let url = urlInput.value.trim();
    if (!url.startsWith('http')) url = 'https://' + url;
    webview.src = url;
  }
  document.getElementById('btn-go').onclick = navigate;
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });

  // Update URL bar on navigation
  webview.addEventListener('did-navigate', e => {
    urlInput.value = e.url.replace(/^https?:\/\//, '');
  });
  webview.addEventListener('did-navigate-in-page', e => {
    urlInput.value = e.url.replace(/^https?:\/\//, '');
  });

  // Hide loader when page loads
  let loaderTimer;
  function hideLoader() {
    clearTimeout(loaderTimer);
    setTimeout(() => loader.classList.add('hidden'), 300);
  }

  webview.addEventListener('did-finish-load', hideLoader);
  webview.addEventListener('did-stop-loading', hideLoader);

  // Fallback: force-hide after 6 seconds no matter what
  webview.addEventListener('did-start-loading', () => {
    loader.classList.remove('hidden');
    clearTimeout(loaderTimer);
    loaderTimer = setTimeout(hideLoader, 6000);
  });
</script>
</body>
</html>
